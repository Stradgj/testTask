name: DevSecOps Pipeline

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  secret-scanning:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sca:
    name: SCA (npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: npm audit
        working-directory: ./backend
        run: npm audit --audit-level=high --json | tee npm-audit-report.json && npm audit --audit-level=high

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: backend/npm-audit-report.json
          retention-days: 30

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan
        run: |
          semgrep scan \
            --config=p/default \
            --config=p/security-audit \
            --json \
            --output=semgrep-report.json \
            --error \
            --severity=ERROR \
            --severity=WARNING \
            .

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json
          retention-days: 30

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [secret-scanning, sca, sast]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.secret-scanning.result }}" != "success" || \
                "${{ needs.sca.result }}"            != "success" || \
                "${{ needs.sast.result }}"           != "success" ]]; then
            echo "❌ Security Gate FAILED"
            exit 1
          fi
          echo "✅ Security Gate PASSED"
